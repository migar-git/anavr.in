# Agency-gate - enforces the resident-agent laws (pre-commit) on every push/PR.
name: agency-gate
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  agency-laws:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure
